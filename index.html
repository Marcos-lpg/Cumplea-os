<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Mi Amor!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Corazones animados */
        .bg-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            background-color: rgba(255, 255, 255, 0.5);
            display: inline-block;
            width: 20px;
            height: 20px;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            animation: moveUp 15s linear infinite;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Tarjeta Adaptable */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.8);
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Foto circular responsiva */
        .photo-container {
            width: clamp(120px, 35vw, 160px);
            height: clamp(120px, 35vw, 160px);
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            border: 5px solid #ff4d6d;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            color: #ff4d6d;
            margin-bottom: 0.5rem;
        }

        .age {
            background: #ff4d6d;
            color: #fff;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .message {
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            line-height: 1.6;
            color: #444;
            margin-bottom: 2rem;
        }

        .message b {
            color: #ff4d6d;
        }

        /* Botón estilo WhatsApp responsivo */
        .btn {
            background: #25d366; 
            color: #fff;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #128c7e;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        @media (max-width: 400px) {
            .card { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="hearts-container"></div>

    <div class="card">
        <div class="photo-container">
            <img src="gina.jpg" alt="Gina">
        </div>

        <h1>¡Feliz Cumple corazón!</h1>
        <div class="age">21 años</div>
        
        <p class="message">
            Mi amor, hoy es un día muy especial y quería recordarte lo mucho que significas para mí. <br><br>
            Gracias por cada risa y por compartir tu vida conmigo. Eres increíble y te mereces lo mejor del mundo.<br><br>
            <b>Te amo muchísimo. ❤️</b>
        </p>

        <a href="https://wa.me/529821165375?text=Si%20me%20haces%20feliz%20mi%20amor❤️" class="btn">
            Si te hago feliz, presiona aquí ❤️
        </a>
    </div>

    <script>
        const container = document.getElementById('hearts-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 5 + 10 + "s";
            heart.style.width = heart.style.height = Math.random() * 15 + 15 + "px";
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 15000);
        }
        setInterval(createHeart, 600);
    </script>

</body>
</html>
